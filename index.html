<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect Checker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <div class="container mx-auto px-4 py-12 max-w-3xl flex-grow">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-2">
                <i class="fa-solid fa-compass-drafting text-blue-600 mr-2"></i>Redirect Checker
            </h1>
            <p class="text-lg text-slate-600">Verifică statusul HTTP și lanțul complet de redirecturi pentru orice URL.</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <form id="redirectForm" class="flex flex-col sm:flex-row gap-3">
                <input 
                    type="url" 
                    id="urlInput" 
                    placeholder="https://example.com" 
                    required 
                    class="flex-grow px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base"
                >
                <button 
                    type="submit" 
                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-xl transition duration-200 flex items-center justify-center gap-2 cursor-pointer"
                >
                    <i class="fa-solid fa-magnifying-glass"></i> Analizează
                </button>
            </form>
        </div>

        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-300 border-t-blue-600 mb-2"></div>
            <p class="text-slate-500">Se analizează traseul URL-ului...</p>
        </div>

        <div id="resultsContainer" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                <i class="fa-solid fa-route text-slate-500"></i> Lanțul de redirecționare:
            </h2>
            
            <div id="redirectChain" class="space-y-4 relative before:absolute before:bottom-6 before:top-6 before:left-6 before:w-0.5 before:bg-slate-200">
                </div>
        </div>
    </div>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-sm text-slate-500">
        &copy; 2026 Redirect Checker — Creat cu GitHub Pages
    </footer>

    <script>
        document.getElementById('redirectForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const urlInput = document.getElementById('urlInput').value.trim();
    const loading = document.getElementById('loading');
    const resultsContainer = document.getElementById('resultsContainer');
    const redirectChain = document.getElementById('redirectChain');
    
    loading.classList.remove('hidden');
    resultsContainer.classList.add('hidden');
    redirectChain.innerHTML = '';

    try {
        // Folosim un proxy CORS alternativ și mai stabil pentru request-uri de tip HEAD/GET
        // adăugând un timestamp pentru a preveni cache-ul agresiv care dă NetworkError
        const cacheBuster = new Date().getTime();
        const proxyUrl = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(urlInput)}`;
        
        const response = await fetch(proxyUrl);
        
        if (!response.ok) throw new Error('Serverul proxy nu a putut accesa URL-ul.');
        
        // Obținem URL-ul final la care a ajuns proxy-ul
        const finalUrl = response.url.includes('?quest=') 
            ? urlInput // Dacă proxy-ul nu a schimbat URL-ul în obiectul response
            : response.url;

        loading.classList.add('hidden');
        resultsContainer.classList.remove('hidden');

        // Verificăm dacă URL-ul s-a schimbat (semn de redirect)
        if (cleanUrl(finalUrl) !== cleanUrl(urlInput)) {
            appendStep(urlInput, "301 / 302", "Redirecționat", "border-amber-500 text-amber-700 bg-amber-50", "fa-right-from-bracket");
            appendStep(finalUrl, "200 OK", "Destinație Finală", "border-emerald-500 text-emerald-700 bg-emerald-50", "fa-check");
        } else {
            appendStep(urlInput, "200 OK", "Direct (Fără redirect)", "border-emerald-500 text-emerald-700 bg-emerald-50", "fa-link");
        }

    } catch (error) {
        loading.classList.add('hidden');
        // Mesaj de eroare mai prietenos și explicativ
        alert('Eroare de rețea (CORS blochează acest URL în browser). Încearcă cu http:// sau alt domeniu.');
        console.error(error);
    }
});

// Funcție ajutătoare pentru a curăța URL-urile de query-uri proxy
function cleanUrl(url) {
    try {
        const u = new URL(url);
        if (u.searchParams.has('quest')) {
            return u.searchParams.get('quest');
        }
        return url;
    } catch(e) {
        return url;
    }
}
    </script>
</body>
</html>
